server:
  # Essencial para o OAuth2 funcionar corretamente com HTTPS por trás do proxy do Railway
  forward-headers-strategy: framework 

spring:
  application:
    name: montador-de-rpg-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_rpg}
    username: ${SPRING_DATASOURCE_USERNAME:rpguser}
    password: ${SPRING_DATASOURCE_PASSWORD:rpgpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          discord:
            client-id: ${DISCORD_CLIENT_ID}
            client-secret: ${DISCORD_CLIENT_SECRET}
            scope:
              - identify
              - email
            client-name: Discord
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          discord:
            authorization-uri: https://discord.com/api/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id

app:
  jwt:
    secret: ${JWT_SECRET:SUA_CHAVE_SECRETA_SUPER_SEGURA_COM_PELO_MENOS_256_BITS_MUDAR_DEPOIS}
    expirationInMs: 86400000
  oauth2:
    # Redireciona para sua produção na Vercel por padrão se a variável não existir
    authorizedRedirectUri: ${APP_OAUTH2_REDIRECT_URI:https://montador-de-rpg.vercel.app/oauth2/redirect}
  cors:
    # Libera sua Vercel e os ambientes de teste locais por padrão
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://montador-de-rpg.vercel.app,http://localhost:5173,http://localhost:3000}